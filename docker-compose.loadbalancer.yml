services:
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
    restart: unless-stopped

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
    restart: unless-stopped

  backend3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
    restart: unless-stopped

  loadbalancer:
    image: nginx:1.27-alpine
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "4000:80"
    volumes:
      - ./infra/nginx/eqras-lb.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
